<!-- Consent-aware tracking integrations using HubSpot's official API -->
<script>
  (function () {
    if (typeof window === "undefined") return;

    var INTERCOM_APP_ID = 'x7ezvsde';

    // Initialize HubSpot tracking queue for consent callbacks.
    window._hsq = window._hsq || window._hsp || [];
    window._hsp = window._hsp || window._hsq;

    function isLocalHost() {
      var host = (window.location && window.location.hostname) || '';
      return host === 'localhost' || host === '127.0.0.1' || host === '::1';
    }

    function loadHubSpot() {
      if (window.__hsLoaded) return;
      window.__hsLoaded = true;
      var s = document.createElement('script');
      s.type = 'text/javascript';
      s.id = 'hs-script-loader';
      s.async = true;
      s.defer = true;
      s.src = 'https://js.hs-scripts.com/23414950.js';
      document.head.appendChild(s);
    }

    function isGrantedValue(value) {
      return value === true || value === 1 || value === '1' || value === 'true';
    }

    function firstDefined(values) {
      for (var i = 0; i < values.length; i++) {
        if (values[i] !== undefined && values[i] !== null) return values[i];
      }
      return undefined;
    }

    function getConsentStateFromObject(source) {
      var categories =
        source && source.categories && typeof source.categories === 'object'
          ? source.categories
          : null;

      var analyticsRaw = firstDefined([
        categories && categories.analytics,
        source && source.analytics
      ]);

      var functionalRaw = firstDefined([
        categories && categories.functionality,
        categories && categories.functional,
        categories && categories.preferences,
        source && source.functionality,
        source && source.functional,
        source && source.preferences
      ]);

      var adsRaw = firstDefined([
        categories && categories.advertisement,
        categories && categories.advertising,
        categories && categories.marketing,
        source && source.advertisement,
        source && source.advertising,
        source && source.marketing
      ]);

      return {
        analyticsGranted: isGrantedValue(analyticsRaw),
        functionalGranted: isGrantedValue(functionalRaw),
        adsGranted: isGrantedValue(adsRaw)
      };
    }

    function ensureDefaultConsentDenied() {
      if (window.__gtmDefaultConsentSet) return;
      window.__gtmDefaultConsentSet = true;

      window.dataLayer = window.dataLayer || [];
      window.gtag = window.gtag || function(){ window.dataLayer.push(arguments); };

      window.gtag('consent', 'default', {
        ad_storage: 'denied',
        analytics_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied'
      });
    }

    function applyConsentUpdate(consentState) {
      ensureDefaultConsentDenied();

      var analyticsStorage = consentState.analyticsGranted ? 'granted' : 'denied';
      var adStorage = consentState.adsGranted ? 'granted' : 'denied';
      var adUserData = consentState.adsGranted ? 'granted' : 'denied';
      var adPersonalization = consentState.adsGranted ? 'granted' : 'denied';

      var signature = [
        analyticsStorage,
        adStorage,
        adUserData,
        adPersonalization
      ].join('|');

      if (window.__gtmConsentSignature === signature) return;
      window.__gtmConsentSignature = signature;

      window.gtag('consent', 'update', {
        analytics_storage: analyticsStorage,
        ad_storage: adStorage,
        ad_user_data: adUserData,
        ad_personalization: adPersonalization
      });
    }

    function getConsentStateFromCookie() {
      try {
        var name = '__hs_cookie_cat_pref=';
        var cookies = document.cookie ? document.cookie.split(';') : [];
        for (var i = 0; i < cookies.length; i++) {
          var c = cookies[i].trim();
          if (c.indexOf(name) === 0) {
            try {
              var raw = decodeURIComponent(c.substring(name.length));
              var parsed = JSON.parse(raw);
              var state = getConsentStateFromObject(parsed);
              return state;
            } catch (_) {
              return null;
            }
          }
        }
      } catch (_) {}
      return null;
    }

    function hasListenerConsentPayload(consent) {
      return !!(
        consent &&
        consent.categories &&
        typeof consent.categories === 'object'
      );
    }

    function getConsentStateFromListener(consent) {
      if (!consent || typeof consent !== 'object') return null;
      if (hasListenerConsentPayload(consent)) return getConsentStateFromObject(consent);
      if (consent.allowed !== undefined) {
        var granted = isGrantedValue(consent.allowed);
        return {
          analyticsGranted: granted,
          functionalGranted: false,
          adsGranted: false
        };
      }
      return null;
    }

    function getIntercomCookieDomains() {
      var host = (window.location && window.location.hostname) || '';
      var domains = [null];

      if (!host) return domains;

      domains.push(host);

      if (host.indexOf('.') !== -1) {
        var parts = host.split('.');
        if (parts.length > 2) {
          domains.push('.' + parts.slice(parts.length - 2).join('.'));
        } else {
          domains.push('.' + host);
        }
      }

      return domains;
    }

    function clearIntercomCookies() {
      var cookies = document.cookie ? document.cookie.split(';') : [];
      var domains = getIntercomCookieDomains();
      for (var i = 0; i < cookies.length; i++) {
        var cookieName = cookies[i].split('=')[0].trim();
        if (cookieName.indexOf('intercom-') !== 0) continue;
        for (var j = 0; j < domains.length; j++) {
          var cookie = cookieName + '=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; SameSite=Lax';
          if (domains[j]) cookie += '; domain=' + domains[j];
          document.cookie = cookie;
        }
      }
    }

    function loadIntercom() {
      if (window.__trackingBlockedForLocal || !INTERCOM_APP_ID) return;

      window.intercomSettings = {
        api_base: 'https://api-iam.intercom.io',
        app_id: INTERCOM_APP_ID
      };

      if (typeof window.Intercom === 'function') {
        if (window.__intercomBooted) {
          window.Intercom('update', window.intercomSettings);
        } else {
          window.Intercom('boot', window.intercomSettings);
          window.__intercomBooted = true;
        }
        return;
      }

      var queuedIntercom = function() {
        queuedIntercom.c(arguments);
      };
      queuedIntercom.q = [];
      queuedIntercom.c = function(args) {
        queuedIntercom.q.push(args);
      };
      window.Intercom = queuedIntercom;
      window.Intercom('boot', window.intercomSettings);
      window.__intercomBooted = true;

      if (window.__intercomScriptLoaded) return;
      window.__intercomScriptLoaded = true;

      var script = document.createElement('script');
      script.async = true;
      script.src = 'https://widget.intercom.io/widget/' + encodeURIComponent(INTERCOM_APP_ID);
      document.head.appendChild(script);
    }

    function shutdownIntercom() {
      if (typeof window.Intercom === 'function' && window.__intercomBooted) {
        try {
          window.Intercom('shutdown');
        } catch (_) {}
      }

      window.__intercomBooted = false;
      clearIntercomCookies();
    }

    function handleConsentState(consentState) {
      applyConsentUpdate(consentState);
      if (consentState.analyticsGranted && !window.__trackingBlockedForLocal) {
        loadGTM();
      }
      if (consentState.functionalGranted) {
        loadIntercom();
      } else {
        shutdownIntercom();
      }
    }

    // Loader for Google Tag Manager (respects consent)
    function loadGTM() {
      if (window.__gtmLoaded) return;
      window.__gtmLoaded = true;
      var gtmId = 'GTM-T8Z9D5XH';
      ensureDefaultConsentDenied();

      window.dataLayer.push({ 'gtm.start': new Date().getTime(), 'event': 'gtm.js' });
      window.dataLayer.push({ 'event': 'consent_ready' });
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtm.js?id=' + encodeURIComponent(gtmId);
      document.head.appendChild(s);
    }

    ensureDefaultConsentDenied();
    window.__trackingBlockedForLocal = isLocalHost();
    loadHubSpot();

    // Use HubSpot's official privacy consent listener
    window._hsq.push(['addPrivacyConsentListener', function(consent) {
      var payloadConsentState = getConsentStateFromListener(consent);
      var cookieConsentState = getConsentStateFromCookie();
      var consentState = payloadConsentState || cookieConsentState;

      if (!consentState) return;

      handleConsentState(consentState);
    }]);

    // Cookie fallback for returning users
    var cookieConsentState = getConsentStateFromCookie();
    if (cookieConsentState) {
      handleConsentState(cookieConsentState);
    }
  })();
</script>
